spring.application.name=my-memo-api
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# # 接続先を 3307 ポートに変更
# spring.datasource.url=jdbc:mysql://localhost:3307/my_memo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# 1. 接続先URLをコンテナからホスト(Windows)を見る設定に変更
# spring.datasource.url=jdbc:mysql://host.docker.internal:3307/my_memo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# 1. docker-compose.yml で定義したサービス名を使って接続する設定に変更(docker内部javaコンテナ→docker内部mysqlコンテナを直接紐づけ)
spring.datasource.url=jdbc:mysql://db:3306/my_memo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# 設定したパスワードとユーザー名
spring.datasource.username=root
spring.datasource.password=password

# Hibernateの設定（テーブルを自動作成してくれる設定）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 2. 方言（Dialect）の警告を消すために最新版の記述に変更
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
