<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Memo Front</title>
</head>
<body>
    <h1>My Memo フロントエンド起動！</h1>
    <p>ここが Node.js の世界です。</p>

    <div id="app">
        <h1>My Memo</h1>
    
        <div class="form-container" style="margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 8px;">
            <h3>新しいメモを投稿</h3>
            <input type="text" id="post-title" placeholder="タイトルを入力..."
                style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <textarea id="post-content" placeholder="内容を入力..."
                style="width: 100%; height: 100px; margin-bottom: 10px; padding: 8px;"></textarea>
            <button id="submit-btn" style="padding: 10px 20px; cursor: pointer;">投稿する！</button>
        </div>
    
        <hr>
    
        <div id="post-list"></div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
